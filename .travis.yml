anguage: node_js

node_js: stable

cache:
  directories:
  - node_modules
before_install:
  - npm install -g hexo-cli
  - npm install hexo-renderer-pug hexo-renderer-stylus --save

install:
  - npm install

script:
  - hexo clean
  - hexo g 

after_script:
  - cd ./public
  - git init
  - git config user.name "yuexiliuli"
  - git config user.email "1614639905@qq.com"
  - git add .
  - git commit -m "TravisCI 自动部署"
  # Github Pages
  - git push --force --quiet "https://${GH_TOKEN}@${GH_REF}" master:master

env:
  global:
    - GH_REF: github.com/yuexiliuli/yuexiliuli.github.io.git
  
notifications:
  email:
    - 1614639905@qq.com
  on_success: change
  on_failure: always
