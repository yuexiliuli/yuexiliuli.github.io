# 指定构建环境是Node.js，当前版本是稳定版
anguage: node_js
node_js: stable

env:
 global:
   - URL_REPO: github.com/yuexiliuli/yuexiliuli.github.io.git

# 设置钩子只检测blog-source分支的push变动
branches:
  only:
    - blog-source

# 设置缓存文件
cache:
  directories:
    - node_modules

#在构建之前安装hexo环境
before_install:
  - npm install -g hexo-cli
  - npm install hexo-renderer-pug hexo-renderer-stylus --save

#安装git插件和搜索功能插件
install:
  - npm install

  # 设置git提交名，邮箱；替换真实token到_config.yml文件
before_script:
   cd ./public
  - git init
  - git config user.name "yuexiliuli"
  - git config user.email "1614639905@qq.com"
  - git add .
  - git commit -m "TravisCI 自动部署"
  # Github Pages
  - git push --force --quiet "https://${GH_TOKEN}@${GH_REF}" master:master

# 执行清缓存，生成网页操作
script: 
  - hexo clean
  - hexo generate
  # - hexo d
  # - echo ${ENV_TEST}

# configure notifications (email, IRC, campfire etc)
# please update this section to your needs!
# https://docs.travis-ci.com/user/notifications/
notifications:
  email:
    - 1614639905@qq.com
  on_success: change
  on_failure: always